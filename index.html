      }

    <!-- Ads (Retained) -->
    <script

  <body

    <!-- Navigation -->

              cdbenly

          </div>
          <div class="hidden md:block">
            <div class="ml-10 flex items-baseline space-x-8">

              >
                Home

                ></span>
              </a>
            </div>
          </div>
          <!-- Mobile menu button (simplified) -->
          <div class="-mr-2 flex md:hidden">
            <button
              type="button"
              class="bg-slate-900 inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-white"
            >

              <svg
                class="block h-6 w-6"
                xmlns="http://www.w3.org/2000/svg"

                viewBox="0 0 24 24"

                <path

    <!-- Main Content Wrapper -->

                <div

              <div class="flex items-center justify-between mb-4">

                <div

              </div>
              <div id="event3">
                <div class="flex items-baseline space-x-2 mb-6">
                  <span
                    id="years3"
                    class="text-4xl font-bold text-white tracking-tight"
                    >0</span
                  >
                  <span class="text-sm text-slate-500 font-medium">YEARS</span>
                </div>
                <div
                  class="grid grid-cols-4 gap-2 text-center border-t border-white/5 pt-4"
                >
                  <div>
                    <div id="days3" class="text-lg font-mono text-slate-300">
                      0
                    </div>
                    <div class="text-[10px] text-slate-500 uppercase">Days</div>

                  <div>

                  <div>

          <!-- Counter Card 4 -->

        <!-- Blog Content Injector Target -->
        <div id="main" class="max-w-4xl mx-auto space-y-12">
          <!-- Fallback Loading State -->
          <div class="animate-pulse space-y-8">
            <div class="h-64 bg-slate-800/50 rounded-2xl"></div>
            <div class="space-y-4">

    <!-- Scripts -->
    <script src="counter.js"></script>
    <script src="main.js"></script>

    <!-- Refactored Mustache Templates -->
    <script id="itemTemplate" type="text/mustache">
      {{#posts}}
      <article class="relative group bg-slate-900/40 rounded-3xl p-8 border border-white/5 hover:border-indigo-500/20 transition-all duration-300 mb-8 backdrop-blur-sm">
          <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/5 to-purple-500/5 rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="relative z-10 flex flex-col md:flex-row gap-8 items-start">
              <div class="flex-shrink-0 pt-1">
                  <div class="flex items-center space-x-3 text-slate-500 group-hover:text-indigo-400 transition-colors">
                      <div class="w-1 h-12 bg-slate-800 rounded-full group-hover:bg-indigo-500 transition-all duration-500"></div>
                      <span class="font-mono text-sm tracking-wider uppercase">{{date}}</span>
                  </div>
              </div>
              <div class="flex-grow">
                  <h2 class="text-2xl md:text-3xl font-bold mb-4 tracking-tight leading-tight">
                      <a href="{{path}}" class="text-white hover:text-indigo-300 transition-colors duration-200 block bg-gradient-to-r from-white to-white bg-[length:0%_2px] bg-left-bottom bg-no-repeat transition-all group-hover:bg-[length:100%_2px]">
                          {{title}}
                      </a>
                  </h2>
                  <div class="text-slate-400 leading-relaxed line-clamp-3">
                      <!-- Description placeholder if any -->
                      Explore the details of this post...
                  </div>
                  <div class="mt-6 flex items-center text-indigo-400 text-sm font-medium group-hover:translate-x-2 transition-transform duration-300">
                      Read Article
                      <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                  </div>
              </div>
          </div>
      </article>
      {{/posts}}

      <div class="flex justify-center items-center space-x-2 mt-16">
          <span class="text-slate-500 text-xs uppercase tracking-widest mr-4 font-semibold">Pages</span>
          <div class="flex space-x-2">
          {{#pages}}
               {{#select}}
                  <span class="flex items-center justify-center w-10 h-10 rounded-full bg-indigo-600 text-white font-bold shadow-lg shadow-indigo-500/30 ring-2 ring-indigo-500 ring-offset-2 ring-offset-slate-900 transition-all scale-110">{{num}}</span>
              {{/select}}
              {{^select}}
                  <a href="{{path}}" class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all hover:scale-105 hover:shadow-lg">{{num}}</a>
              {{/select}}
          {{/pages}}
          </div>
      </div>
    </script>

    <script id="archiveTemplate" type="text/mustache">
      {{#group}}
      <div class="mb-12">
        <h3 class="text-3xl font-bold TEXT-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-8 inline-block pb-2 border-b-2 border-indigo-500/30">
            {{name}}
        </h3>
        <div class="space-y-4">
            {{#posts}}
            <div class="group flex items-center justify-between p-4 rounded-xl bg-slate-800/30 hover:bg-slate-800/60 border border-white/5 hover:border-indigo-500/20 transition-all duration-300 cursor-pointer">
                <a href="{{path}}" class="flex-grow flex items-center justify-between">
                    <span class="text-lg text-slate-200 font-medium group-hover:text-indigo-300 transition-colors">{{title}}</span>
                    <span class="font-mono text-sm text-slate-500 group-hover:text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-white/5">{{date}}</span>
                </a>
            </div>
            {{/posts}}
        </div>
      </div>
      {{/group}}
    </script>

    <!-- Retain other templates if needed, simpler style -->
    <script id="pagesTemplate" type="text/mustache">
      <ul class="flex space-x-4">
      {{#pages}}
      <li>
          <a href="{{path}}" class="text-slate-400 hover:text-white transition-colors">{{title}}</a>
      </li>
      {{/pages}}
      </ul>
    </script>

    <script id="tagsTemplate" type="text/mustache">
      <div class="flex flex-wrap gap-3 mt-4">
          {{#tags}}
          <a href="{{path}}" class="px-3 py-1 bg-slate-800 text-indigo-300 text-xs uppercase tracking-wide rounded-full border border-indigo-500/20 hover:bg-indigo-500/10 hover:border-indigo-500/50 transition-all" style="font-size: {{size}}%">
              #{{name}}
          </a>
          {{/tags}}
      </div>
    </script>
